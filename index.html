<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Obfuscator - Kostenlos & Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 Lua Obfuscator</h1>
            <p>Schütze deinen Lua-Code mit Prometheus</p>
        </header>

        <div class="main-grid">
            <!-- Eingabe -->
            <div class="card">
                <div class="card-header">
                    <h2>📝 Lua Code</h2>
                    <span class="badge" id="charCount">0 Zeichen</span>
                </div>
                <textarea id="luaInput" placeholder="-- Dein Lua Code hier..."></textarea>
                
                <div class="options">
                    <label>
                        <input type="checkbox" id="minify" checked>
                        📦 Minify
                    </label>
                    <label>
                        <input type="checkbox" id="encrypt">
                        🔐 Encrypt Strings
                    </label>
                    <label>
                        <input type="checkbox" id="rename" checked>
                        🔄 Rename Variables
                    </label>
                </div>
                
                <button id="obfuscateBtn" onclick="obfuscateCode()">
                    ⚡ Obfuscate (Ctrl+Enter)
                </button>
                
                <div id="status" class="status"></div>
            </div>

            <!-- Ausgabe -->
            <div class="card">
                <div class="card-header">
                    <h2>🔒 Obfuscated Code</h2>
                    <div class="actions">
                        <button onclick="copyOutput()" class="btn-sm">📋 Copy</button>
                        <button onclick="downloadOutput()" class="btn-sm">💾 Download</button>
                    </div>
                </div>
                <textarea id="luaOutput" readonly placeholder="Obfuscated Code erscheint hier..."></textarea>
                
                <div id="stats" class="stats" style="display:none;">
                    <span>Original: <strong id="origSize">0</strong> bytes</span>
                    <span>Obfuscated: <strong id="obfSize">0</strong> bytes</span>
                    <span>Compression: <strong id="compression">0%</strong></span>
                </div>
            </div>
        </div>

        <!-- Beispiele -->
        <div class="examples">
            <h3>📚 Beispiele</h3>
            <div class="example-buttons">
                <button onclick="loadExample('basic')">Basic Function</button>
                <button onclick="loadExample('table')">Table Operations</button>
                <button onclick="loadExample('class')">Class Example</button>
            </div>
        </div>

        <footer>
            <p>Backend läuft auf <a href="https://render.com" target="_blank">Render</a> | 
            <a href="https://github.com/deinusername/lua-obfuscator" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
